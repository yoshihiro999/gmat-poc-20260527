name: GitHub Actions Redaction Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TEST_SECRET: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: exact value
        run: |
          echo "exact: $TEST_SECRET" || true

      - name: base64
        run: |
          echo "base64: $(echo -n "$TEST_SECRET" | base64)" || true

      - name: hex
        run: |
          echo "hex: $(echo -n "$TEST_SECRET" | xxd -p)" || true

      - name: split halves
        run: |
          LEN=${#TEST_SECRET}
          HALF=$((LEN / 2))
          echo "first: ${TEST_SECRET:0:$HALF}"
          echo "second: ${TEST_SECRET:$HALF}"

      - name: reverse
        run: |
          echo "reverse: $(echo -n "$TEST_SECRET" | rev)" || true

      - name: char-by-char with separator
        run: |
          echo "chars: $(echo -n "$TEST_SECRET" | sed 's/./&-/g')" || true
